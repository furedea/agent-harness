commit-msg:
  commands:
    commitlint:
      run: commitlint --edit {1}

# pre-commit owns whole-project format check and lint. Test execution is
# delegated to CI and the agent-harness run_related_tests hook.
pre-commit:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: bash -c 'mapfile -t files < <(git ls-files "*.nix"); ((${#files[@]} == 0)) || nixfmt --check "${files[@]}"'
    statix:
      glob: "*.nix"
      run: statix check .
    deadnix:
      glob: "*.nix"
      run: deadnix --fail .
    fmt:
      glob: "*.rs"
      run: cargo fmt --check
    clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings
    ruff-format:
      glob: "*.py"
      run: uv run --frozen ruff format --check agents/skills tests/python
    ruff-check:
      glob: "*.py"
      run: uv run --frozen ruff check agents/skills tests/python
    ty:
      glob: "*.py"
      run: uv run --frozen ty check
    ls-lint:
      run: git ls-files -z | xargs -0 ls_lint
