name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to rebuild artifacts for
        required: true
        type: string

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Check release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_PLEASE_TOKEN" ]]; then
            echo "RELEASE_PLEASE_TOKEN repository secret is required."
            exit 1
          fi

      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-artifacts:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      CARGO_DIST_VERSION: 0.30.2
      TARGET: x86_64-unknown-linux-musl
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || needs.release-please.outputs.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ env.TAG_NAME }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: stable
          rustflags: ""

      - name: Install Rust release target
        run: rustup target add "$TARGET"

      - name: Install musl build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh" \
            | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: cargo test --locked

      - name: Build release artifacts
        run: |
          set -euo pipefail

          dist build \
            --tag "$TAG_NAME" \
            --target "$TARGET" \
            --artifacts=all \
            --output-format=json \
            > dist-manifest.json
          dist print-upload-files-from-manifest \
            --manifest dist-manifest.json \
            > dist-upload-files.txt

      - name: Smoke test packaged archive
        run: |
          set -euo pipefail

          archive_path="$(
            find target/distrib -maxdepth 1 -type f \
              \( -name "agent-harness-${TARGET}.tar.xz" -o -name "agent-harness-${TARGET}.tar.gz" \) \
              | head -n 1
          )"

          if [[ -z "$archive_path" ]]; then
            echo "agent-harness archive for ${TARGET} was not produced."
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/install" "$tmpdir/home"

          case "$archive_path" in
            *.tar.xz)
              tar -xJf "$archive_path" -C "$tmpdir/install" --strip-components=1
              ;;
            *.tar.gz)
              tar -xzf "$archive_path" -C "$tmpdir/install" --strip-components=1
              ;;
            *)
              echo "unsupported archive format: $archive_path"
              exit 1
              ;;
          esac

          "$tmpdir/install/agent-harness" --version
          "$tmpdir/install/agent-harness" install --prefix "$tmpdir/home"
          "$tmpdir/install/agent-harness" verify --prefix "$tmpdir/home"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/distrib/*

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t artifact_paths < dist-upload-files.txt
          if ((${#artifact_paths[@]} == 0)); then
            echo "cargo-dist did not report uploadable files."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${artifact_paths[@]}" --clobber
