ls:
  .dir: regex:\.?[a-z0-9]+(-[a-z0-9]+)*
  .*: regex:[a-z0-9]*([._][a-z0-9]+)*

ignore:
  - .git
  - .direnv
  - result
  - result-*
  - docs/logs

  - README.md
  - CHANGELOG.md
  - .release-please-manifest.json
  - release-please-config.json
  - agents/AGENTS.md
  - "agents/skills/*/SKILL.md"
  - Cargo.toml
  - Cargo.lock

  - .coverage
  - .venv
  - .uv-cache
  - .ruff_cache
  - .pytest_cache
  - .ipynb_checkpoints
  - "agents/**/__pycache__"
  - "tests/**/__pycache__"
  - target
